<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TechDecor Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            margin: 0;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Hiệu ứng background gradient mờ ảo */
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1), transparent);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
        }

        .auth-header h2 { margin-bottom: 0.5rem; font-size: 1.8rem; }
        .auth-header p { opacity: 0.9; font-size: 0.9rem; }

        .auth-body { padding: 2.5rem 2rem; }

        /* Social Login */
        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-social:hover { background: #f8fafc; border-color: var(--primary); }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        .divider span { padding: 0 10px; }

        /* Form styling */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--dark); }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray); }
        
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: var(--radius);
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-login:hover { background: #000; transform: translateY(-2px); }

        /* Hiệu ứng Loading */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .spinner { display: block; }
        .loading span { display: none; }

        .form-footer { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--gray); }
        .form-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" style="color: white; text-decoration: none; position: absolute; top: 20px; left: 20px; font-size: 0.8rem;">
                    <i class="fas fa-arrow-left"></i> Trang chủ
                </a>
                <i class="fas fa-cube fa-3x" style="margin-bottom: 1rem;"></i>
                <h2>TechDecor Hub</h2>
                <p>Chào mừng bạn đã quay trở lại!</p>
            </div>

            <div class="auth-body">
                <div class="social-auth">
                    <button class="btn-social">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18"> Google
                    </button>
                    <button class="btn-social">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="18"> Facebook
                    </button>
                </div>

                <div class="divider"><span>Hoặc đăng nhập bằng Email</span></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="example@gmail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" id="toggleBtn">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <label style="font-size: 0.85rem; cursor: pointer;">
                            <input type="checkbox"> Ghi nhớ tôi
                        </label>
                        <a href="#" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-login" id="submitBtn">
                        <div class="spinner"></div>
                        <span>Đăng nhập ngay</span>
                    </button>

                    <div class="form-footer">
                        Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script>
        // 1. Dữ liệu tài khoản mẫu
        const USERS_DATA = [
            { email: "user@example.com", password: "user123", name: "Nguyễn Văn A", role: "user" },
            { email: "admin@techdecor.vn", password: "admin123", name: "Quản trị viên", role: "admin" }
        ];

        // 2. Hiện/Ẩn mật khẩu
        const toggleBtn = document.getElementById('toggleBtn');
        const passwordInput = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleBtn.querySelector('i').classList.toggle('fa-eye');
            toggleBtn.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // 3. Xử lý Đăng nhập
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.onsubmit = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Hiệu ứng Loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            // Giả lập gửi lên server (trễ 1.2s)
            setTimeout(() => {
                const user = USERS_DATA.find(u => u.email === email && u.password === password);

                if (user) {
                    showToast('Thành công! Chào mừng ' + user.name, 'success');
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    setTimeout(() => {
                        window.location.href = (user.role === 'admin') ? 'admin.html' : 'index.html';
                    }, 1000);
                } else {
                    showToast('Email hoặc mật khẩu không đúng!', 'error');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            }, 1200);
        };

        // 4. Hàm hiển thị thông báo (Toast)
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; right: 20px; padding: 15px 25px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white; border-radius: 10px; box-shadow: 0 10px 15px rgba(0,0,0,0.1);
                z-index: 9999; animation: slideIn 0.3s ease-out;
            `;
            toast.innerText = message;
            document.body.appendChild(toast);

            setTimeout(() => { toast.remove(); }, 3000);
        }

        // Thêm animation CSS cho toast
        const style = document.createElement('style');
        style.innerHTML = `@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
