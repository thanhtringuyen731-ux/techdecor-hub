<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - TechDecor Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <i class="fas fa-cube"></i>
                    <span>TechDecor Hub</span>
                </a>
                <ul class="nav-menu">
                    <li><a href="index.html">← Quay về trang chủ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-2">Đăng ký tài khoản</h2>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullname">
                        <i class="fas fa-user"></i> Họ và tên
                    </label>
                    <input type="text" id="fullname" placeholder="" required>
                </div>
                
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" placeholder="" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone"></i> Số điện thoại
                    </label>
                    <input type="tel" id="phone" placeholder="" required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <input type="password" id="password" placeholder="Mật khẩu (ít nhất 6 ký tự)" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i> Xác nhận mật khẩu
                    </label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: start; gap: 0.5rem;">
                        <input type="checkbox" required style="margin-top: 0.2rem;">
                        <span>Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a></span>
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-user-plus"></i> Đăng ký tài khoản
                    </button>
                </div>
                
                <p class="text-center mt-2">
                    Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                </p>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p class="copyright">&copy; 2026 TechDecor Hub</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showNotification('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }
            
            showNotification('Đăng ký thành công! Chuyển hướng...', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
