<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - TechDecor Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --bg: #f8fafc;
        }

        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .checkout-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            color: var(--dark);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        /* Phương thức thanh toán */
        .payment-method {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .payment-method:hover { background: #f8fafc; }
        .payment-method input[type="radio"]:checked + span { font-weight: bold; color: var(--primary); }

        /* Tóm tắt đơn hàng */
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .price-summary {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
        }

        .price-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .price-total { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-top: 10px; border-top: 2px solid #cbd5e1; padding-top: 10px; }

        .btn-order {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.3s;
        }
        .btn-order:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(59, 130, 246, 0.3); }
        .btn-order:disabled { opacity: 0.7; cursor: not-allowed; }

        @media (max-width: 992px) { .checkout-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <i class="fas fa-cube"></i>
                    <span>TechDecor Hub</span>
                </a>
                <ul class="nav-menu">
                    <li><a href="cart.html"><i class="fas fa-chevron-left"></i> Quay lại giỏ hàng</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="checkout-grid">
            <div class="checkout-card">
                <h3 class="section-title"><i class="fas fa-shipping-fast"></i> Thông tin giao hàng</h3>
                <form id="checkoutForm">
                    <div class="input-group">
                        <label>Họ và tên khách hàng *</label>
                        <input type="text" id="fullname" placeholder="Nhập họ tên người nhận" required>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Số điện thoại *</label>
                            <input type="tel" id="phone" placeholder="Số điện thoại liên lạc" required>
                        </div>
                        <div class="input-group">
                            <label>Email nhận hóa đơn *</label>
                            <input type="email" id="email" placeholder="email@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Địa chỉ nhận hàng cụ thể *</label>
                        <textarea id="address" rows="3" placeholder="Số nhà, tên đường, Phường/Xã, Quận/Huyện, Tỉnh/Thành phố" required></textarea>
                    </div>

                    <div class="input-group">
                        <label>Ghi chú (Tùy chọn)</label>
                        <textarea id="note" rows="2" placeholder="Ví dụ: Giao giờ hành chính, gọi trước khi đến..."></textarea>
                    </div>

                    <h3 class="section-title" style="margin-top: 2rem;"><i class="fas fa-wallet"></i> Phương thức thanh toán</h3>
                    <label class="payment-method">
                        <input type="radio" name="payment" value="COD" checked>
                        <span>Thanh toán khi nhận hàng (COD)</span>
                    </label>
                    <label class="payment-method">
                        <input type="radio" name="payment" value="BANK">
                        <span>Chuyển khoản ngân hàng (Quét mã QR)</span>
                    </label>
                </form>
            </div>

            <div class="checkout-card" style="height: fit-content;">
                <h3 class="section-title"><i class="fas fa-shopping-bag"></i> Đơn hàng của bạn</h3>
                <div id="orderList">
                    </div>

                <div class="price-summary">
                    <div class="price-row">
                        <span>Tạm tính</span>
                        <span id="subtotal">0đ</span>
                    </div>
                    <div class="price-row">
                        <span>Phí vận chuyển</span>
                        <span>30.000đ</span>
                    </div>
                    <div class="price-row price-total">
                        <span>Tổng tiền</span>
                        <span id="totalBill">0đ</span>
                    </div>
                </div>

                <button class="btn-order" id="placeOrderBtn" onclick="processOrder()">
                    XÁC NHẬN ĐẶT HÀNG
                </button>
                <p style="text-align: center; font-size: 0.8rem; color: #94a3b8; margin-top: 15px;">
                    Thông tin của bạn được bảo mật theo tiêu chuẩn SSL
                </p>
            </div>
        </div>
    </div>

    <script>
       document.addEventListener('DOMContentLoaded', function() {
        // Lấy dữ liệu từ "túi" LocalStorage
        const data = localStorage.getItem('currentUser');
        console.log("Dữ liệu tìm thấy trong máy:", data); // Dòng này để kiểm tra

        if (data) {
            // Chuyển từ chuỗi chữ sang dạng đối tượng (Object)
            const user = JSON.parse(data);
            
            // Điền vào ô Họ tên (phải trùng ID là 'fullname')
            const inputName = document.getElementById('fullname');
            if (inputName) {
                inputName.value = user.name || ''; 
                console.log("Đã điền tên:", user.name);
            }

            // Điền vào ô Email (phải trùng ID là 'email')
            const inputEmail = document.getElementById('email');
            if (inputEmail) {
                inputEmail.value = user.email || '';
                console.log("Đã điền email:", user.email);
            }
        } else {
            console.warn("Chưa có ai đăng nhập cả!");
        }

        // Sau đó mới chạy hàm hiện sản phẩm
        renderOrder();
    });

        function renderOrder() {
            const cart = JSON.parse(localStorage.getItem('techdecor_cart')) || [];
            const listContainer = document.getElementById('orderList');
            let subtotal = 0;

            if (cart.length === 0) {
                listContainer.innerHTML = '<p style="color:red">Giỏ hàng trống! Vui lòng quay lại chọn món.</p>';
                document.getElementById('placeOrderBtn').disabled = true;
                return;
            }

            listContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                return `
                    <div class="order-item">
                        <div>
                            <strong>${item.name}</strong>
                            <div style="font-size: 0.85rem; color: #64748b;">Số lượng: ${item.quantity}</div>
                        </div>
                        <span>${itemTotal.toLocaleString()}đ</span>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').innerText = subtotal.toLocaleString() + 'đ';
            document.getElementById('totalBill').innerText = (subtotal + 30000).toLocaleString() + 'đ';
        }

        function processOrder() {
            // 3. Kiểm tra thông tin (Validation)
            const form = document.getElementById('checkoutForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const btn = document.getElementById('placeOrderBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';
            btn.disabled = true;

            // 4. Tạo dữ liệu đơn hàng
            const cart = JSON.parse(localStorage.getItem('techdecor_cart'));
            const orders = JSON.parse(localStorage.getItem('techdecor_orders')) || [];
            
            const newOrder = {
                orderId: 'TD' + Date.now().toString().slice(-6),
                customer: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                payment: document.querySelector('input[name="payment"]:checked').value,
                items: cart,
                total: parseInt(document.getElementById('totalBill').innerText.replace(/\D/g,'')),
                date: new Date().toLocaleString('vi-VN'),
                status: 'Chờ xử lý'
            };

            // 5. Lưu và chuyển hướng
            setTimeout(() => {
                orders.push(newOrder);
                localStorage.setItem('techdecor_orders', JSON.stringify(orders));
                localStorage.removeItem('techdecor_cart'); // Xóa giỏ hàng

                alert('🎉 Chúc mừng! Đơn hàng ' + newOrder.orderId + ' đã đặt thành công.');
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>
</html>
